<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>神奈川県公立高校入試 当日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#07101f;
      --bg2:#0e1d33;
      --panel:#12233b;
      --panel-2:#162b46;
      --line-soft:rgba(106, 174, 255, 0.18);
      --text:#eff7ff;
      --muted:#a7bfd7;
      --primary:#84e7ff;
      --accent:#6ee7b7;
      --shadow-md:0 14px 32px rgba(0,0,0,0.24);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,
    body{
      min-height:100%;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Noto Sans JP',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(132,231,255,0.08), transparent 32%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      padding:16px;
    }

    .container{
      width:min(100%, 920px);
      display:grid;
      gap:18px;
      justify-items:center;
      text-align:center;
    }

    .hero{
      width:100%;
      display:grid;
      gap:16px;
      padding:28px 22px;
      border-radius:var(--radius-xl);
      border:1px solid var(--line-soft);
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow:var(--shadow-md);
    }

    h1{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.8rem, 7vw, 4.5rem);
      line-height:1.08;
      color:var(--primary);
      text-shadow:0 0 18px rgba(132,231,255,0.18);
    }

    p{
      font-size:clamp(1rem, 3.6vw, 1.25rem);
      line-height:1.9;
      color:var(--text);
    }

    .sub{
      color:var(--muted);
    }

    .home-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(132,231,255,0.28);
      background:rgba(255,255,255,0.04);
      color:var(--primary);
      font-family:'Orbitron',sans-serif;
      text-decoration:none;
    }

    .home-link:hover{
      background:rgba(255,255,255,0.08);
    }

    @media (min-width: 900px){
      .hero{
        padding:40px 36px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>入試当日です</h1>
      <p>ここまで積み上げてきた力を、落ち着いて出し切ってください。</p>
      <p class="sub">敵は己の中にあり。自分に負けるな。あなたの合格を心から願っています。</p>
      <a class="home-link" href="./index.html">BACK TO COUNTDOWN</a>
    </section>
  </main>
  <script src="./console-message.js"></script>
</body>
</html>
