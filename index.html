<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>2026年度 神奈川県公立高校入試まで</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#07101f;
      --bg2:#0e1d33;
      --panel:#12233b;
      --panel-2:#162b46;
      --line:#2f5276;
      --line-soft:rgba(106, 174, 255, 0.18);
      --text:#eff7ff;
      --muted:#a7bfd7;
      --primary:#84e7ff;
      --accent:#6ee7b7;
      --accent-2:#8f7cff;
      --shadow-lg:0 22px 55px rgba(0,0,0,0.34);
      --shadow-md:0 14px 32px rgba(0,0,0,0.24);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,
    body{
      min-height:100%;
    }

    html{
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Noto Sans JP',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(132,231,255,0.08), transparent 32%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      padding:16px;
      overflow-x:hidden;
    }

    .container{
      width:min(100%, 1100px);
      display:grid;
      gap:18px;
      justify-items:center;
      align-items:start;
      justify-content:center;
      padding:6px 0;
    }

    h1{
      width:fit-content;
      max-width:100%;
      margin:0 auto;
      text-align:center;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.8rem, 7vw, 4.8rem);
      line-height:1.08;
      letter-spacing:0.03em;
      color:var(--primary);
      text-shadow:0 0 18px rgba(132,231,255,0.18);
      justify-self:center;
    }

    .title-line1,
    .title-line2{
      display:block;
    }

    .title-line1{
      color:var(--primary);
      margin-bottom:0.25em;
    }

    .count-wrap{
      width:min(100%, 980px);
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
      justify-content:center;
      justify-items:center;
    }

    #countdown,
    #rgb-on{
      margin:0 auto;
      width:100%;
    }

    .unit{
      display:grid;
      place-items:center;
      gap:8px;
      width:100%;
      min-height:112px;
      padding:16px 10px;
      border-radius:var(--radius-lg);
      border:1px solid var(--line-soft);
      background:linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow:var(--shadow-md);
      text-align:center;
    }

    .unit .value{
      font-size:clamp(1.72rem, 8.2vw, 3.4rem);
      font-weight:800;
      line-height:1;
      letter-spacing:0.02em;
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
    }

    .unit .label{
      color:var(--muted);
      font-size:0.8rem;
      letter-spacing:0.18em;
    }

    .color1{ color:#ff4d4d; }
    .color2{ color:#ff8a33; }
    .color3{ color:#ffd24d; }
    .color4{ color:#4cd97b; }
    .color5{ color:#4d9bff; }
    .color6{ color:#6f5cff; }
    .color7{ color:#b86bff; }
    .color8{ color:#9fff4d; }
    .color9{ color:#aeefff; }
    .color10{ color:#5fb6b6; }
    .color11{ color:#00bfff; }
    .color12{ color:#808000; }
    .color13{ color:#d3a4ff; }
    .color14{ color:#2ea36b; }
    .color15{ color:#800080; }
    .color16{ color:#1f640a; }
    .color17{ color:rgb(24,184,224); }
    .color18{ color:rgb(228,135,29); }
    .color19{ color:rgb(85,56,216); }
    .color20{ color:rgb(42,155,130); }

    .rgb-button{
      width:min(100%, 900px);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      padding:12px;
      border-radius:var(--radius-xl);
      border:1px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
        linear-gradient(180deg, rgba(10,20,38,0.92), rgba(14,29,51,0.92));
      box-shadow:var(--shadow-md);
    }

    .switch_label{
      position:relative;
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      align-items:center;
      gap:12px;
      width:100%;
      padding:10px 12px;
      border-radius:var(--radius-md);
      cursor:pointer;
      user-select:none;
      background:rgba(255,255,255,0.025);
      border:1px solid rgba(255,255,255,0.03);
      transition:background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .switch_label:hover{
      background:rgba(255,255,255,0.04);
      border-color:rgba(132,231,255,0.12);
    }

    .switch_label input[type="checkbox"]{
      position:absolute;
      width:1px;
      height:1px;
      margin:-1px;
      padding:0;
      border:0;
      clip:rect(0 0 0 0);
      clip-path:inset(50%);
      overflow:hidden;
      white-space:nowrap;
    }

    .base{
      width:60px;
      height:34px;
      border-radius:999px;
      position:relative;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .circle{
      position:absolute;
      top:3px;
      left:3px;
      width:26px;
      height:26px;
      border-radius:50%;
      background:linear-gradient(180deg, #ffffff, #dff6ff);
      box-shadow:0 2px 8px rgba(0,0,0,0.22);
      transition:transform 0.18s ease;
    }

    .switch_label input[type="checkbox"]:checked + .base{
      background:linear-gradient(90deg, var(--primary), var(--accent));
      border-color:rgba(132,231,255,0.46);
    }

    .switch_label input[type="checkbox"]:checked + .base .circle{
      transform:translateX(26px);
    }

    .switch_label input[type="checkbox"]:focus-visible + .base{
      outline:2px solid rgba(132,231,255,0.95);
      outline-offset:2px;
    }

    .switch-title{
      min-width:0;
      font-family:'Orbitron',sans-serif;
      font-weight:700;
      font-size:0.92rem;
      color:var(--text);
      letter-spacing:0.03em;
    }

    .switch_label input[type="checkbox"]:checked + .base + .switch-title{
      color:var(--primary);
    }

    .switch-title.rgb::before{
      content:"RGB ";
      margin-right:4px;
    }

    .switch-title.ms::before{
      content:"ミリ秒 ";
      margin-right:4px;
    }

    .switch-title.exam-time::before{
      content:"試験時刻 ";
      margin-right:4px;
    }

    @media (max-width: 359px){
      body{
        padding:12px;
      }

      .container{
        gap:14px;
      }

      h1{
        font-size:1.45rem;
      }

      .unit{
        min-height:94px;
        padding:12px 8px;
      }

      .unit .value{
        font-size:1.55rem;
      }

      .unit .label{
        font-size:0.72rem;
        letter-spacing:0.12em;
      }

      .rgb-button{
        padding:10px;
      }

      .switch_label{
        padding:9px 10px;
      }

      .switch-title{
        font-size:0.8rem;
      }
    }

    @media (min-width: 600px){
      .container{
        gap:24px;
      }

      .count-wrap{
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:14px;
        width:min(100%, 980px);
      }

      .unit{
        min-height:144px;
        padding:20px 14px;
      }

      .unit .value{
        font-size:clamp(2.2rem, 5vw, 3.5rem);
      }

      .rgb-button{
        grid-template-columns:repeat(3, minmax(0, 1fr));
        align-items:stretch;
      }
    }

    @media (min-width: 900px){
      body{
        padding:28px;
      }

      .container{
        gap:34px;
        justify-items:center;
      }

      h1{
        font-size:clamp(3.2rem, 5vw, 4.9rem);
        white-space:nowrap;
        width:auto;
        justify-self:center;
      }

      .title-line1,
      .title-line2{
        display:inline;
      }

      .title-line1{
        margin-bottom:0;
        margin-right:0.24em;
      }

      .count-wrap{
        width:fit-content;
        grid-template-columns:repeat(4, auto);
        gap:18px;
        margin:0 auto;
      }

      .unit{
        width:210px;
      }

      .unit .value{
        font-size:clamp(2.8rem, 4vw, 4rem);
      }

      .unit .label{
        font-size:0.95rem;
      }

      .rgb-button{
        width:min(100%, 900px);
        justify-self:center;
        padding:14px;
        gap:14px;
      }

      .switch_label{
        min-height:76px;
        padding:12px 14px;
      }

      .switch-title{
        font-size:0.95rem;
      }
    }
  </style>
</head>
<body data-exam-month="2" data-exam-day="17" data-show-cs="true" data-display-mode="flex">
  <div class="container" role="main" aria-labelledby="page-title">
    <h1 id="page-title">
      <span class="title-line1" data-exam-year>2026年度</span>
      <span class="title-line2">神奈川県公立高校入試まで</span>
    </h1>

    <div id="countdown" class="count-wrap" aria-live="polite" role="status">
      <div class="unit" data-unit="days"><span class="value">0</span><span class="label">日</span></div>
      <div class="unit" data-unit="hours"><span class="value">0</span><span class="label">時間</span></div>
      <div class="unit" data-unit="minutes"><span class="value">0</span><span class="label">分</span></div>
      <div class="unit" data-unit="seconds"><span class="value">0.00</span><span class="label">秒</span></div>
    </div>

    <div id="rgb-on" class="count-wrap" aria-hidden="true" style="display:none;">
      <div class="unit" data-unit="days"><span class="value">0</span><span class="label">日</span></div>
      <div class="unit" data-unit="hours"><span class="value">0</span><span class="label">時間</span></div>
      <div class="unit" data-unit="minutes"><span class="value">0</span><span class="label">分</span></div>
      <div class="unit" data-unit="seconds"><span class="value">0.00</span><span class="label">秒</span></div>
    </div>

    <div class="rgb-button" role="region" aria-label="RGB とミリ秒の切替">
      <label class="switch_label" for="switch">
        <input id="switch" type="checkbox" aria-checked="false" />
        <div class="base" aria-hidden="true"><div class="circle" aria-hidden="true"></div></div>
        <span class="switch-title rgb" aria-hidden="true">OFF</span>
      </label>

      <label class="switch_label" for="ms-switch">
        <input id="ms-switch" type="checkbox" aria-checked="false" />
        <div class="base" aria-hidden="true"><div class="circle" aria-hidden="true"></div></div>
        <span class="switch-title ms" aria-hidden="true">OFF</span>
      </label>

      <label class="switch_label" for="exam-time-switch">
        <input id="exam-time-switch" type="checkbox" aria-checked="false" />
        <div class="base" aria-hidden="true"><div class="circle" aria-hidden="true"></div></div>
        <span class="switch-title exam-time" aria-hidden="true">0:00</span>
      </label>
    </div>
  </div>

  <script src="./count.js"></script>
</body>
</html>
